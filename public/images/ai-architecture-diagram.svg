<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0A0F1C"/>
    
    {/* Grid Background */}
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
        </pattern>
    </defs>
    <rect width="1200" height="800" fill="url(#grid)"/>

    {/* Nodes */}
    {/* LLM Engine */}
    <rect x="450" y="300" width="300" height="200" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <text x="500" y="380" fill="#FFFFFF" font-family="monospace" font-size="24" font-weight="bold">AI ENGINE v2.0</text>
    <text x="500" y="410" fill="#64748B" font-family="monospace" font-size="14">PROPRIETARY RAG LAYER</text>

    {/* Data Sources */}
    <rect x="100" y="200" width="200" height="80" rx="4" fill="#111827" stroke="#334155" stroke-width="1"/>
    <text x="120" y="245" fill="#94A3B8" font-family="monospace" font-size="16">VIN DATABASES</text>
    
    <rect x="100" y="350" width="200" height="80" rx="4" fill="#111827" stroke="#334155" stroke-width="1"/>
    <text x="120" y="395" fill="#94A3B8" font-family="monospace" font-size="16">MARKET API</text>
    
    <rect x="100" y="500" width="200" height="80" rx="4" fill="#111827" stroke="#334155" stroke-width="1"/>
    <text x="120" y="545" fill="#94A3B8" font-family="monospace" font-size="16">NMVTIS INPUT</text>

    {/* API Consumers */}
    <rect x="900" y="350" width="200" height="100" rx="4" fill="#111827" stroke="#10B981" stroke-width="1"/>
    <text x="920" y="405" fill="#10B981" font-family="monospace" font-size="18">PUBLIC API</text>
    <text x="920" y="425" fill="#4B5563" font-family="monospace" font-size="12">JSON / GRPC</text>

    {/* Connections */}
    <path d="M 300 240 L 450 350" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M 300 390 L 450 400" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M 300 540 L 450 450" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    
    <path d="M 750 400 L 900 400" stroke="#10B981" stroke-width="3" opacity="0.5"/>
    
    {/* Glow Effect */}
    <circle cx="600" cy="400" r="150" fill="#3B82F6" fill-opacity="0.05">
        <animate attributeName="r" values="150;180;150" dur="4s" repeatCount="indefinite" />
    </circle>
</svg>
